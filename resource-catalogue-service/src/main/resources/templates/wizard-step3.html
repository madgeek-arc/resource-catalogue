<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Step 3 - Node Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        p.description {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        button {
            padding: 8px 16px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .primary {
            background-color: #007BFF;
            color: white;
        }

        .primary:hover {
            background-color: #0056b3;
        }

        .secondary {
            background-color: #ccc;
            color: #333;
        }

        .secondary:hover {
            background-color: #999;
        }

        .banner {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .banner-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .banner-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>

<h2>Step 3: Register your node on Node Registry</h2>

<p class="description">
    Register your node to make it discoverable to other EOSC nodes.
    This step is optional and can be skipped.
</p>

<div th:if="${isRegistered}" class="banner banner-success">
    &#10003; This node is already registered on the Node Registry.
</div>

<div th:if="${error}" class="banner banner-error" th:text="${error}"></div>

<form th:action="@{/wizard/step3}" th:object="${nodeRequest}" method="post">

    <div class="form-group">
        <label for="name">Name</label>
        <input id="name" type="text" th:field="*{name}" placeholder="Enter node name"/>
        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <div class="form-group">
        <label for="logo">Logo</label>
        <input id="logo" type="text" th:field="*{logo}" placeholder="https://..."/>
    </div>

    <div class="form-group">
        <label for="legalName">Legal Entity - Name</label>
        <input id="legalName" type="text" th:field="*{legalEntity.name}" placeholder="Organization name"/>
    </div>

    <div class="form-group">
        <label for="rorId">Legal Entity - ROR ID</label>
        <input id="rorId" type="text" th:field="*{legalEntity.rorId}" placeholder="https://ror.org/..."/>
    </div>

    <div class="form-group">
        <label for="endpoint">Node Endpoint</label>
        <input id="endpoint" type="text" th:field="*{nodeEndpoint}" placeholder="https://api.yournode.com"/>
        <div class="error" th:if="${#fields.hasErrors('nodeEndpoint')}" th:errors="*{nodeEndpoint}"></div>
    </div>

    <div class="button-row">
        <button type="submit" name="skip" value="true" class="secondary">
            Skip
        </button>
        <button type="submit" class="primary" th:text="${isRegistered} ? 'Update Registration' : 'Register Node'">
            Register Node
        </button>
    </div>

</form>

</body>
</html>
